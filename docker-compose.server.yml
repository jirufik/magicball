services:
  magicball:
    build: .
    container_name: magicball
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true
